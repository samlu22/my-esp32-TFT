name: Build TFT Hello

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.2

    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd $GITHUB_WORKSPACE
          idf.py set-target esp32s3
          idf.py build

      - name: Merge binary
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd $GITHUB_WORKSPACE
          pip install esptool -q
          python -m esptool --chip esp32s3 merge_bin \
            -o firmware_merged.bin \
            --flash_mode dio --flash_freq 80m --flash_size 16MB \
            0x0     build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0x10000 build/tft_hello.bin

      - uses: actions/upload-artifact@v4
        with:
          name: tft-hello-run${{ github.run_number }}
          path: firmware_merged.bin
          retention-days: 30
